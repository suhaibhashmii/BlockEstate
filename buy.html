<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Property — BlockEstate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="topnav">
    <a href="index.html" class="topnav-brand">
      <div class="brand-icon">B</div>
      <span class="brand-name">BlockEstate</span>
    </a>
    <div class="topnav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="marketplace.html">Marketplace</a>
    </div>
    <div class="topnav-wallet">
      <span class="wallet-badge" id="walletAddressNav">Not connected</span>
    </div>
  </nav>

  <div class="page">
    <div class="container-sm">
      <div class="page-header animate-in">
        <p class="section-label">Acquisition</p>
        <h1 class="section-title" style="margin-bottom:0;">Buy a Property</h1>
      </div>

      <div class="card animate-in">
        <p style="font-size:14px; color:var(--text-muted); margin-bottom:24px;">
          Enter the property ID and the exact price in Wei to complete the on-chain transfer.
        </p>
        <div class="field">
          <label for="buyId">Property ID</label>
          <input type="number" id="buyId" placeholder="e.g. 1" />
        </div>
        <div class="field">
          <label for="buyValue">Value in Wei</label>
          <input type="text" id="buyValue" placeholder="e.g. 1000000000000000000" />
        </div>
        <button id="buyBtn" class="btn-primary" style="margin-top:28px;">Complete Purchase</button>
        <button onclick="goToPage('marketplace.html')" class="btn-ghost">← Back to Marketplace</button>
        <button onclick="goToPage('dashboard.html')" class="btn-ghost">← Back to Dashboard</button>
        <p id="statusMessage" class="status-message"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
