<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Property — BlockEstate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="topnav">
    <a href="index.html" class="topnav-brand">
      <div class="brand-icon">B</div>
      <span class="brand-name">BlockEstate</span>
    </a>
    <div class="topnav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="marketplace.html">Marketplace</a>
    </div>
    <div class="topnav-wallet">
      <span class="wallet-badge" id="walletAddressNav">Not connected</span>
    </div>
  </nav>

  <div class="page">
    <div class="container-sm">
      <div class="page-header animate-in">
        <p class="section-label">On-chain Registration</p>
        <h1 class="section-title" style="margin-bottom:0;">Register a Property</h1>
      </div>

      <div class="card animate-in">
        <div class="field">
          <label for="location">Property Location</label>
          <input type="text" id="location" placeholder="e.g. 14 Baker Street, London" />
        </div>
        <div class="field">
          <label for="price">Price (in Wei)</label>
          <input type="number" id="price" placeholder="e.g. 1000000000000000000" />
        </div>
        <button id="registerBtn" class="btn-primary" style="margin-top:28px;">Register Property</button>
        <button onclick="goToPage('dashboard.html')" class="btn-ghost">← Back to Dashboard</button>
        <p id="statusMessage" class="status-message"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
